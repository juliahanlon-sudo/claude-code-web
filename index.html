<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code - Salesforce AI Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        <path d="M12 12L2 7M12 12L22 7M12 12V22" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <h1>Claude Code</h1>
                </div>
                <button class="new-chat-btn">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 5v14m7-7H5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>New Chat</span>
                </button>
            </div>

            <div class="history-section">
                <h3>Recent Conversations</h3>
                <div class="history-list">
                    <button class="history-item active">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <span>Build custom interface</span>
                    </button>
                    <button class="history-item">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <span>Debug API endpoint</span>
                    </button>
                    <button class="history-item">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <span>Refactor authentication</span>
                    </button>
                </div>
            </div>

            <div class="skills-section">
                <h3>Available Skills</h3>
                <div class="skills-filter">
                    <input type="text" id="skillsSearch" placeholder="Search skills..." />
                </div>
                <div class="skills-list" id="skillsList">
                    <div class="skills-loading">Loading skills...</div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="settings-btn">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 1v6m0 6v6M23 12h-6m-6 0H5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>Settings</span>
                </button>
                <div class="user-profile">
                    <div class="avatar">JH</div>
                    <span class="username">julia.hanlon</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <div class="chat-header">
                <div class="header-left">
                    <h2>Claude Code Assistant</h2>
                    <div class="model-selector-container">
                        <label for="modelSelect" class="model-label">Model:</label>
                        <select id="modelSelect" class="model-select">
                            <option value="sonnet">Sonnet 4.6</option>
                            <option value="opus">Opus 4.8</option>
                            <option value="haiku">Haiku 4.5</option>
                            <option value="fable">Fable 5</option>
                        </select>
                    </div>
                </div>
                <div class="header-right">
                    <div class="auth-status-container">
                        <button class="auth-status" id="salesforceAuth" title="Click to authenticate with Salesforce">
                            <svg viewBox="0 0 24 24" fill="none" class="auth-icon">
                                <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="currentColor" stroke-width="2"/>
                            </svg>
                            <span class="auth-indicator"></span>
                            <span class="auth-text">SF</span>
                        </button>
                        <button class="auth-status" id="googleAuth" title="Click to authenticate with Google Workspace">
                            <svg viewBox="0 0 24 24" fill="none" class="auth-icon">
                                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                                <path d="M16 8l-4 4-2-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            <span class="auth-indicator"></span>
                            <span class="auth-text">Google</span>
                        </button>
                    </div>
                    <button class="icon-btn" title="Clear chat">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                    <button class="icon-btn" title="Export conversation">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <button class="icon-btn" title="More options">
                        <svg viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="5" r="1" fill="currentColor"/>
                            <circle cx="12" cy="12" r="1" fill="currentColor"/>
                            <circle cx="12" cy="19" r="1" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="welcome-message">
                    <div class="welcome-icon">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" fill="url(#gradient)" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                            <path d="M12 12L2 7M12 12L22 7M12 12V22" stroke="currentColor" stroke-width="2"/>
                            <defs>
                                <linearGradient id="gradient" x1="2" y1="2" x2="22" y2="22">
                                    <stop offset="0%" stop-color="#0176D3"/>
                                    <stop offset="100%" stop-color="#1B96FF"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h3>Welcome to Claude Code</h3>
                    <p>Your AI-powered coding assistant with Salesforce integration</p>
                    <div class="quick-actions">
                        <button class="quick-action-btn">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" stroke="currentColor" stroke-width="2"/>
                                <path d="M13 2v7h7" stroke="currentColor" stroke-width="2"/>
                            </svg>
                            <div>
                                <strong>Create Component</strong>
                                <span>Build Lightning Web Components</span>
                            </div>
                        </button>
                        <button class="quick-action-btn">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="2"/>
                            </svg>
                            <div>
                                <strong>Review Code</strong>
                                <span>Get AI code review feedback</span>
                            </div>
                        </button>
                        <button class="quick-action-btn">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            <div>
                                <strong>Debug Issue</strong>
                                <span>Troubleshoot errors and bugs</span>
                            </div>
                        </button>
                        <button class="quick-action-btn">
                            <svg viewBox="0 0 24 24" fill="none">
                                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                                <path d="M12 16v-4M12 8h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            <div>
                                <strong>Explain Code</strong>
                                <span>Understand complex code sections</span>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <button class="icon-btn attach-btn" title="Attach file">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <textarea
                        id="messageInput"
                        placeholder="Ask Claude to help with your code..."
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" title="Send message (Enter)">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
                <div class="input-footer">
                    <span class="context-info">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2"/>
                            <path d="M9 22V12h6v10" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        ~/projects/salesforce-app
                    </span>
                    <span class="token-count">0 tokens used</span>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
